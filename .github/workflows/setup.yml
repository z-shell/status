name: Setup CI
on:
  push:
    paths:
      - ".upptimerc.yml"
  repository_dispatch:
    types: [setup]
  workflow_dispatch:
  
permissions: read-all

jobs:
  release:
    name: Setup Upptime
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      issues: write
      pages: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Update template
        uses: upptime/uptime-monitor@5d69af5f0d5b6172fee77bb0daa7a3fc3b62139b # v1.43.5
        with:
          command: "update-template"
        env:
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
      - name: Update response time
        uses: upptime/uptime-monitor@5d69af5f0d5b6172fee77bb0daa7a3fc3b62139b # v1.43.5
        with:
          command: "response-time"
        env:
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
          SECRETS_CONTEXT: ${{ toJson(secrets) }}
      - name: Update summary in README
        uses: upptime/uptime-monitor@5d69af5f0d5b6172fee77bb0daa7a3fc3b62139b # v1.43.5
        with:
          command: "readme"
        env:
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate graphs
        uses: benc-uk/workflow-dispatch@31e2b3319479a63f0ab15bf800eff9e913504e26 # v1
        with:
          workflow: Graphs CI
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Generate site
        uses: upptime/uptime-monitor@5d69af5f0d5b6172fee77bb0daa7a3fc3b62139b # v1.43.5
        with:
          command: "site"
        env:
          GH_PAT: ${{ secrets.GITHUB_TOKEN }}
      - uses: peaceiris/actions-gh-pages@84c30a85c19949d7eee79c4ff27748b70285e453 # v4
        name: GitHub Pages Deploy
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: "site/status-page/__sapper__/export/"
          force_orphan: "false"
          user_name: "digital-teams[Bot]"
          user_email: "actions@zshell.dev"
